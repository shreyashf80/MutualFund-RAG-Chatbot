<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
    <g>
        <!-- Magnifying Glass Ring (Represents Analysis / Facts) -->
        <circle cx="42" cy="42" r="32" stroke="#06b6d4" stroke-width="6" />
        
        <!-- Magnifying Glass Handle -->
        <path d="M 64.6 64.6 L 86 86" stroke="#06b6d4" stroke-width="8" stroke-linecap="round" />
        
        <!-- Upward Candlestick Chart Inside (Represents Wealth / Markets) -->
        <!-- Candlestick 1 -->
        <line x1="28" y1="40" x2="28" y2="60" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" />
        <rect x="24" y="45" width="8" height="10" rx="1.5" fill="#67e8f9" />
        
        <!-- Candlestick 2 -->
        <line x1="42" y1="28" x2="42" y2="60" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" />
        <rect x="38" y="34" width="8" height="21" rx="1.5" fill="#67e8f9" />
        
        <!-- Candlestick 3 -->
        <line x1="56" y1="16" x2="56" y2="60" stroke="#67e8f9" stroke-width="2" stroke-linecap="round" />
        <rect x="52" y="24" width="8" height="31" rx="1.5" fill="#67e8f9" />
    </g>
</svg>
