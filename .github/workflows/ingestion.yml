name: Daily Ingestion Trigger

on:
  schedule:
    # Runs at 10:00 AM IST every day.
    # 10:00 AM IST is 04:30 AM UTC.
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  trigger-ingestion:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Ingestion API
        # Replace the URL below with your actual deployed Railway URL
        run: |
          curl -X POST "https://${{ secrets.RAILWAY_URL }}/api/ingest" \
               -H "Content-Type: application/json" \
               --fail
